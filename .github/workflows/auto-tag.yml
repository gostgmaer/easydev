name: Auto Tag & Write Version

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags

      - name: Calculate next tag
        id: version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          PATCH=$((PATCH + 1))

          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "New tag: $NEW_TAG"

          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

      - name: Ensure version file exists
        run: |
          mkdir -p src
          echo "export const APP_VERSION = \"$NEW_TAG\";" > src/version.ts

      - name: Commit version file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add src/version.ts
          git commit -m "chore: release $NEW_TAG" || echo "Nothing to commit"

      - name: Create tag
        run: |
          git tag $NEW_TAG || echo "Tag already exists"

      - name: Push changes
        run: |
          git push origin main
          git push origin $NEW_TAG
